<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj Digital - España y Perú</title>
    <link rel="stylesheet" href="clock-style.css">
</head>
<body>
    <div class="container">
        <h1>Reloj Digital</h1>
        <div class="clocks-wrapper">
            <div class="clock">
                <h2>🇪🇸 España</h2>
                <p class="timezone">Europa/Madrid</p>
                <div class="time" id="spain-time">00:00:00</div>
            </div>
            <div class="clock">
                <h2>🇵🇪 Perú</h2>
                <p class="timezone">América/Lima</p>
                <div class="time" id="peru-time">00:00:00</div>
            </div>
        </div>
    </div>
    <script src="clock-script.js"></script>
</body>
</html>
